name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pester:
    name: Pester (PS ${{ matrix.ps-version }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        ps-version: ['5.1', '7']

    steps:
    - uses: actions/checkout@v4

    - name: Install Pester 3.4 (PS 5.1)
      if: matrix.ps-version == '5.1'
      shell: powershell
      run: |
        Install-Module Pester -RequiredVersion 3.4.0 -Force -SkipPublisherCheck -Scope CurrentUser
        Get-Module -ListAvailable Pester | Format-Table Name, Version, Path

    - name: Install Pester 3.4 (PS 7)
      if: matrix.ps-version == '7'
      shell: pwsh
      run: |
        Install-Module Pester -RequiredVersion 3.4.0 -Force -SkipPublisherCheck -Scope CurrentUser
        Get-Module -ListAvailable Pester | Format-Table Name, Version, Path

    - name: Run Pester (PS 5.1)
      if: matrix.ps-version == '5.1'
      shell: powershell
      run: |
        $result = Invoke-Pester tests/apply-claude-kit.tests.ps1 -PassThru
        if ($result.FailedCount -gt 0) {
          Write-Error "Pester failures: $($result.FailedCount)"
          exit 1
        }

    - name: Run Pester (PS 7)
      if: matrix.ps-version == '7'
      shell: pwsh
      run: |
        $result = Invoke-Pester tests/apply-claude-kit.tests.ps1 -PassThru
        if ($result.FailedCount -gt 0) {
          Write-Error "Pester failures: $($result.FailedCount)"
          exit 1
        }

  lint:
    name: PSScriptAnalyzer (PS 5.1 target)
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install PSScriptAnalyzer
      shell: powershell
      run: Install-Module PSScriptAnalyzer -Force -SkipPublisherCheck -Scope CurrentUser

    - name: Run lint
      shell: powershell
      run: pwsh -NoProfile -File scripts/lint.ps1 -Strict
