name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pester:
    name: Pester (PS ${{ matrix.ps-version }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        ps-version: ['5.1', '7']

    steps:
    - uses: actions/checkout@v4

    - name: Install Pester 3.4 (PS 5.1)
      if: matrix.ps-version == '5.1'
      shell: powershell
      run: |
        Install-Module Pester -RequiredVersion 3.4.0 -Force -SkipPublisherCheck -Scope CurrentUser
        Get-Module -ListAvailable Pester | Format-Table Name, Version, Path

    - name: Install Pester 3.4 (PS 7)
      if: matrix.ps-version == '7'
      shell: pwsh
      run: |
        Install-Module Pester -RequiredVersion 3.4.0 -Force -SkipPublisherCheck -Scope CurrentUser
        Get-Module -ListAvailable Pester | Format-Table Name, Version, Path

    - name: Run Pester (PS 5.1)
      if: matrix.ps-version == '5.1'
      shell: powershell
      run: |
        # windows-latest ships Pester 5.x preinstalled, which auto-loads over the
        # 3.4.0 we install. The suite is written for v3 (legacy Should syntax,
        # top-level scope), so pin v3 explicitly before invoking.
        Import-Module Pester -RequiredVersion 3.4.0 -Force
        $result = Invoke-Pester -Path tests -PassThru
        if ($result.FailedCount -gt 0) {
          Write-Error "Pester failures: $($result.FailedCount)"
          exit 1
        }

    - name: Run Pester (PS 7)
      if: matrix.ps-version == '7'
      shell: pwsh
      run: |
        # windows-latest ships Pester 5.x preinstalled, which auto-loads over the
        # 3.4.0 we install. The suite is written for v3 (legacy Should syntax,
        # top-level scope), so pin v3 explicitly before invoking.
        Import-Module Pester -RequiredVersion 3.4.0 -Force
        $result = Invoke-Pester -Path tests -PassThru
        if ($result.FailedCount -gt 0) {
          Write-Error "Pester failures: $($result.FailedCount)"
          exit 1
        }

  lint:
    name: PSScriptAnalyzer (PS 5.1 target)
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install PSScriptAnalyzer
      shell: powershell
      run: Install-Module PSScriptAnalyzer -Force -SkipPublisherCheck -Scope CurrentUser

    - name: Run lint
      shell: powershell
      # Run under the same Windows PowerShell 5.1 host the install step used, so
      # PSScriptAnalyzer (installed to the 5.1 CurrentUser module path above) is
      # actually resolvable. Spawning `pwsh` (PS 7) here would use a different
      # module path and miss the freshly-installed module -- and the job is
      # explicitly the "PS 5.1 target" lint. lint.ps1 declares #requires 5.1.
      run: .\scripts\lint.ps1 -Strict

  leakscan:
    name: Leak Scan
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0  # full history so gitleaks can scan past commits

    - name: Run gitleaks
      uses: gitleaks/gitleaks-action@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GITLEAKS_CONFIG: .gitleaks.toml
