# Distribution repository URL metadata (env override supported)
# bootstrap.ps1 resolves the clone URL in this priority:
# 1. $env:ENGINEER_CLAUDE_KIT_GIT_URL
# 2. CLI argument -GitUrl
# 3. git remote get-url origin (derived from the clone itself)
# There is intentionally no hard-coded url_default fallback: the per-target
# clone URL is documented generically in the README instead (see ADR-0003).

distribution:
  primary:
    url_env: ENGINEER_CLAUDE_KIT_GIT_URL
    host: ado
  mirrors:
    - url: https://github.com/ttamakijp/engineer-claude-kit
      host: github
      role: development
